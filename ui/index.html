<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <!-- maximum-scale=1 + user-scalable=no stops iOS Safari from auto-zooming when
         a sub-16px input gains focus (app shell, not a content page).
         interactive-widget=resizes-content (added below for non-iOS) keeps Android
         bottom sheets above the soft keyboard; on iOS it reflowed the centered home
         when the keyboard opened, so iOS is handled in layout instead (top-aligned
         home + visualViewport --app-vvh chat, see useViewportHeightVar). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>avibe</title>

    <!-- PWA / iOS standalone: "Add to Home Screen" launches a full-screen app
         (no Safari chrome), which sidesteps the iOS keyboard whitespace/accessory
         bar issues. We register the push service worker only after the user
         opts into notifications; app assets stay network-fresh (Vite
         content-hashes JS/CSS), so frontend updates always land. -->
    <!-- use-credentials: the manifest sits behind the remote-access auth cookie
         (it's not in the public-exempt paths), so the browser must send creds or
         it gets the login redirect instead of the manifest. -->
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="avibe" />
    <meta name="theme-color" content="#080812" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
    <script>
      (function () {
        var key = "vibe-remote-theme";
        var mode = null;

        try {
          var queryMode = new URLSearchParams(window.location.search).get("theme");
          var storedMode = window.localStorage.getItem(key);

          if (queryMode === "light" || queryMode === "dark" || queryMode === "system") {
            mode = queryMode;
          } else if (storedMode === "light" || storedMode === "dark" || storedMode === "system") {
            mode = storedMode;
          }
        } catch (error) {
          mode = null;
        }

        if (mode === "light" || mode === "dark") {
          document.documentElement.setAttribute("data-theme", mode);
        }
      })();
    </script>
    <script>
      // Enable interactive-widget=resizes-content on Android/desktop (keeps bottom
      // sheets above the soft keyboard) but NOT on iOS, where it reflowed the
      // layout badly when the keyboard opened. Placed AFTER the theme bootstrap so
      // ui/scripts/validate-theme.mjs still treats the theme script as the first
      // inline script. Browsers re-evaluate the viewport meta on content change.
      (function () {
        try {
          var ua = navigator.userAgent || '';
          var isIOS =
            /iP(hone|ad|od)/.test(ua) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          if (!isIOS) {
            var vp = document.querySelector('meta[name="viewport"]');
            if (vp) vp.setAttribute('content', vp.getAttribute('content') + ', interactive-widget=resizes-content');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
