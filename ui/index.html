<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <!-- maximum-scale=1 + user-scalable=no stops iOS Safari from auto-zooming when
         a sub-16px input gains focus (app shell, not a content page).
         interactive-widget=resizes-content lets Android shrink the layout for the
         keyboard; iOS uses the visualViewport-driven --app-vvh instead (see
         useViewportHeightVar). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Vibe Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
    <script>
      (function () {
        var key = "vibe-remote-theme";
        var mode = null;

        try {
          var queryMode = new URLSearchParams(window.location.search).get("theme");
          var storedMode = window.localStorage.getItem(key);

          if (queryMode === "light" || queryMode === "dark" || queryMode === "system") {
            mode = queryMode;
          } else if (storedMode === "light" || storedMode === "dark" || storedMode === "system") {
            mode = storedMode;
          }
        } catch (error) {
          mode = null;
        }

        if (mode === "light" || mode === "dark") {
          document.documentElement.setAttribute("data-theme", mode);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
