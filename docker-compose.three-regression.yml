services:
  vibe:
    image: vibe-remote-three-regression:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: integration
    command: ["full"]
    network_mode: host
    environment:
      VIBE_REMOTE_HOME: /data/vibe_remote
      VIBE_DEPLOYMENT_ENV: regression
      VIBE_UI_PORT: ${THREE_REGRESSION_PORT:-15130}
      PYTHONUNBUFFERED: "1"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_AUTH_TOKEN: ${THREE_REGRESSION_CLAUDE_AUTH_TOKEN:-}
      CLAUDE_CODE_ATTRIBUTION_HEADER: ${THREE_REGRESSION_CLAUDE_ATTRIBUTION_HEADER:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; urllib.request.urlopen(f\"http://localhost:{os.environ['VIBE_UI_PORT']}/health\", timeout=3)"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - ./_tmp/three-regression/vibe:/data/vibe_remote
      - ./_tmp/three-regression/shared-home/.claude:/root/.claude
      - ./_tmp/three-regression/shared-home/.claude.json:/root/.claude.json
      - ./_tmp/three-regression/shared-home/.codex:/root/.codex
      - ./_tmp/three-regression/shared-home/.config/opencode:/root/.config/opencode
      - ./_tmp/three-regression/shared-home/.local/share/opencode:/root/.local/share/opencode
