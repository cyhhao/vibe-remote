name: Release (AI Notes)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0 or v1.0.1rc1)"
        required: true
        type: string
      model:
        description: "OpenAI model (default: gpt-5.2)"
        required: false
        type: string
        default: "gpt-5.4"
      max_commits:
        description: "Max commits to summarize"
        required: false
        type: string
        default: "200"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is empty" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Classify release type
        id: release_type
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PRERELEASE="false"

          if [[ "$TAG" == *-* ]]; then
            PRERELEASE="true"
          elif [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*((a|b|rc|dev)[0-9]+)$ ]]; then
            PRERELEASE="true"
          fi

          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Compute previous tag
        id: prev
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Find the previous semantic version tag (v*) before current tag.
          # This assumes tags follow semver-like ordering.
          PREV=""
          FOUND="false"
          while IFS= read -r t; do
            if [ "$t" = "$TAG" ]; then
              FOUND="true"
              break
            fi
            PREV="$t"
          done < <(git tag -l 'v*' --sort=v:refname)

          if [ "$FOUND" != "true" ]; then
            echo "Current tag '$TAG' not found in git tags" >&2
            git tag -l 'v*' --sort=v:refname | tail -n 50 >&2
            exit 1
          fi

          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: Collect commits
        id: commits
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV="${{ steps.prev.outputs.prev }}"

          # workflow_dispatch input is string, keep it robust.
          MAX_COMMITS="${{ github.event.inputs.max_commits }}"
          if [ -z "$MAX_COMMITS" ]; then
            MAX_COMMITS="200"
          fi

          if [ -z "$PREV" ]; then
            RANGE="$TAG"
            echo "No previous tag found. Summarizing commits reachable by $TAG (limited)."
            git log --no-merges --pretty=format:'- %h %s' "$TAG" -n "$MAX_COMMITS" > commits.txt
          else
            RANGE="$PREV..$TAG"
            git log --no-merges --pretty=format:'- %h %s' "$RANGE" -n "$MAX_COMMITS" > commits.txt
          fi

          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

          COUNT=$(wc -l < commits.txt | tr -d ' ')
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"

          # Best-effort: extract PR numbers.
          # - Squash merge style: "... (#123)"
          # - Merge commit style: "Merge pull request #123 from ..."
          : > prs.txt
          perl -ne 'while (/\(#(\d+)\)/g) { print "$1\n" }' commits.txt >> prs.txt || true

          if [ -n "$RANGE" ]; then
            git log --first-parent --merges --pretty=format:'%s' "$RANGE" \
              | perl -ne 'while (/Merge pull request #(\d+)/g) { print "$1\n" }' \
              >> prs.txt || true
          fi

          sort -u prs.txt -o prs.txt || true

          PR_COUNT=$(wc -l < prs.txt | tr -d ' ')
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

          echo "Commit count: $COUNT"
          echo "PR references found: $PR_COUNT"
          if [ "$COUNT" = "0" ]; then
            echo "No commits found in range $RANGE" >&2
          fi

      - name: Generate release notes (OpenAI)
        id: notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.model || 'gpt-5.4' }}
          TAG: ${{ steps.tag.outputs.tag }}
          RANGE: ${{ steps.commits.outputs.range }}
          COMMIT_COUNT: ${{ steps.commits.outputs.commit_count }}
          PR_COUNT: ${{ steps.commits.outputs.pr_count }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY secret" >&2
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required but not installed on runner" >&2
            exit 1
          fi

          if [[ "$RANGE" == *".."* ]]; then
            COMPARE_PATH="${RANGE/../...}"
            COMPARE_URL="https://github.com/${REPO}/compare/${COMPARE_PATH}"
          else
            COMPARE_URL="https://github.com/${REPO}/commits/${TAG}"
          fi

          # Best-effort PR enrichment: fetch PR titles/labels if we can detect PR numbers.
          PRS_SUMMARY=""
          if [ -s prs.txt ] && command -v gh >/dev/null 2>&1; then
            : > prs_summary.txt
            # Hard limit to avoid rate/time blowups
            head -n 80 prs.txt | while read -r pr; do
              [ -z "$pr" ] && continue
              gh api -H "Accept: application/vnd.github+json" "repos/${REPO}/pulls/${pr}" \
                --jq '"- #\(.number) \(.title) (@\(.user.login))" + (if (.labels|length) > 0 then " [" + ([.labels[].name]|join(", ")) + "]" else "" end)' \
                >> prs_summary.txt || true
            done
            if [ -s prs_summary.txt ]; then
              PRS_SUMMARY=$(cat prs_summary.txt)
            fi
          fi

          # Always pass full commits as primary source; PRs supplement context.
          COMMITS=$(cat commits.txt 2>/dev/null || true)

          cat > prompt.txt <<PROMPT
          Generate GitHub Release Notes (Markdown) for version ${TAG}.

          ## Source priority
          - Commits are the PRIMARY source of truth — they show what actually shipped.
          - PR titles/labels are SUPPLEMENTARY context for grouping and attribution.
          - Do NOT skip commits just because a PR list exists.
          - Do NOT hallucinate. Use only the provided data.

          ## Highlights (most important)
          Write a ## Highlights section (2-4 bullets) that answers: "Why should I upgrade?"
          - Focus on USER-FACING impact: new capabilities, meaningful UX improvements, important fixes.
          - Use action-oriented language: "You can now ...", "X is now Y% faster", "Fixed a bug where ...".
          - Skip internal refactors, CI tweaks, and dependency bumps — those go in Changes.
          - If a change is significant but technical, translate it into user benefit.
          - Omit Highlights entirely only if the release is purely internal housekeeping.

          ## Changes
          Group remaining items under ### Added / ### Changed / ### Fixed / ### Security / ### Breaking.
          - Omit empty groups.
          - Each bullet: one line, start with a verb, reference PR number if available.
          - Minor/internal items (deps, CI, refactor) can be collapsed into a single "Internal" bullet or omitted.

          ## Format
          - Output MUST be bilingual in this exact order:
            1) English release notes
            2) A single Markdown horizontal rule: ---
            3) Chinese release notes (natural Chinese, not machine-translated)
          - Final line in each language section: **Full Changelog**: ${COMPARE_URL}

          Context: ${REPO} ${RANGE}
          PROMPT

          if [ -n "$PRS_SUMMARY" ]; then
            printf '\nPull Requests:\n%s\n' "$PRS_SUMMARY" >> prompt.txt
          fi
          printf '\nCommits (%s):\n%s\n' "$COMMIT_COUNT" "$COMMITS" >> prompt.txt

          jq -n \
            --arg model "$OPENAI_MODEL" \
            --rawfile prompt prompt.txt \
            '{
              model: $model,
              messages: [
                {role: "system", content: "You are a developer-relations writer who distills commit logs into release notes that developers actually want to read. Lead with impact, be specific, never invent changes."},
                {role: "user", content: $prompt}
              ],
              temperature: 0.2
            }' > request.json

          HTTP_CODE=$(curl -sS -w '%{http_code}' \
            --connect-timeout 30 \
            --max-time 300 \
            --retry 2 \
            --retry-delay 10 \
            --retry-max-time 660 \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @request.json \
            -o response.json \
            https://api.openai.com/v1/chat/completions)

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "OpenAI API returned HTTP $HTTP_CODE" >&2
            cat response.json >&2 || true
            exit 1
          fi

          ERROR_MSG=$(jq -r '.error.message // empty' response.json)
          if [ -n "$ERROR_MSG" ]; then
            echo "OpenAI API error: $ERROR_MSG" >&2
            jq -r '.error' response.json >&2 || true
            exit 1
          fi

          jq -r '.choices[0].message.content // empty' response.json > release.md

          if [ ! -s release.md ]; then
            echo "Release notes generation produced empty output" >&2
            echo "Response:" >&2
            cat response.json >&2
            exit 1
          fi

          if ! grep -qF "$COMPARE_URL" release.md; then
            printf "\n\nFull Changelog: %s\n" "$COMPARE_URL" >> release.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release.md
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.release_type.outputs.prerelease != 'true' }}
